name: statefulset-replicas-mismatch
version: "1.0"
description: "Detects StatefulSet rollout stalls (KubeStatefulSetReplicasMismatch)"

trigger:
  alert_types:
    - generic
  log_patterns:
    - "KubeStatefulSetReplicasMismatch"
    - "StatefulSet.*not matched the expected number of replicas"
    - "StatefulSet.*not been rolled out"
    - "StatefulSet.*update.*not.*rolled"

diagnosis:
  template: |
    StatefulSet in {{.Tenant}} does not have the expected number of ready replicas.
    This alert fires whenever ready replicas != desired, so check pod health first —
    a revision mismatch is only one of several causes:
      kubectl get pods -n {{.Tenant}} -l app=<name>
      kubectl describe pod <non-ready-pod> -n {{.Tenant}}
    Look for a pod that is not Ready: CrashLoopBackOff, Pending, failing readiness
    probe, or an unbound PVC.

    If every pod looks healthy but a rollout is stuck, StatefulSet updates proceed
    from the highest ordinal down to 0, so the stuck pod is the highest-numbered one
    not yet on the new revision, not necessarily pod-0. Find it with:
      kubectl rollout status statefulset/<name> -n {{.Tenant}}
      kubectl get pods -n {{.Tenant}} -l app=<name> -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.metadata.labels.controller-revision-hash}{"\n"}{end}'
    then delete the pod whose revision hash doesn't match the StatefulSet's
    updateRevision to force the controller to recreate it on the updated spec:
      kubectl delete pod <stuck-pod> -n {{.Tenant}}
  confidence: MEDIUM
  fixable: false

capabilities:
  - send_notification
