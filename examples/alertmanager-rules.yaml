# Example Prometheus alerting rules for mctl-agent.
#
# These rules trigger alerts that mctl-agent can handle.
# Install in your Prometheus/kube-prometheus-stack configuration.
#
# Each alert name must match one of the supported alert types in
# internal/monitor/alerthandler.go classifyAlert().

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mctl-agent-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # ── Pod Health ──────────────────────────────────────────────────────────
    - name: mctl.pod-health
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: >-
              Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping
              ({{ $value | humanize }} restarts in 15m)

        - alert: KubePodNotReady
          expr: |
            kube_pod_status_ready{condition="true"} == 0
            and on(pod, namespace) kube_pod_status_phase{phase="Running"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: >-
              Pod {{ $labels.namespace }}/{{ $labels.pod }} has been
              not-ready for more than 10 minutes

    # ── Tenant Resource Quotas ──────────────────────────────────────────────
    - name: mctl.tenant-quotas
      rules:
        - alert: TenantCPUQuotaHigh
          expr: |
            sum by (namespace) (
              rate(container_cpu_usage_seconds_total{container!=""}[5m])
            )
            /
            sum by (namespace) (
              kube_resourcequota{type="hard", resource="limits.cpu"}
            ) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: >-
              Namespace {{ $labels.namespace }} CPU usage is at
              {{ $value | humanizePercentage }} of quota

        - alert: TenantMemoryQuotaHigh
          expr: |
            sum by (namespace) (
              container_memory_working_set_bytes{container!=""}
            )
            /
            sum by (namespace) (
              kube_resourcequota{type="hard", resource="limits.memory"}
            ) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: >-
              Namespace {{ $labels.namespace }} memory usage is at
              {{ $value | humanizePercentage }} of quota

    # ── Argo Workflows ──────────────────────────────────────────────────────
    - name: mctl.argo-workflows
      rules:
        - alert: ArgoWorkflowFailed
          expr: |
            argo_workflows_count{status="Failed"} > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: >-
              Argo Workflow {{ $labels.name }} in namespace
              {{ $labels.namespace }} has failed

        - alert: ArgoWorkflowHighFailureRate
          expr: |
            rate(argo_workflows_count{status="Failed"}[1h])
            /
            rate(argo_workflows_count[1h]) > 0.3
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: >-
              Argo Workflow failure rate in {{ $labels.namespace }} is
              {{ $value | humanizePercentage }} over the last hour

    # ── Node Health (optional) ──────────────────────────────────────────────
    - name: mctl.node-health
      rules:
        - alert: NodeHighCPU
          expr: |
            1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) > 0.9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: >-
              Node {{ $labels.instance }} CPU usage above 90%
              for 15 minutes

        - alert: NodeHighMemory
          expr: |
            1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: >-
              Node {{ $labels.instance }} memory usage above 90%
              for 15 minutes

        - alert: NodeDiskPressure
          expr: |
            kube_node_status_condition{condition="DiskPressure", status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: >-
              Node {{ $labels.node }} has disk pressure

    # ── Vault ───────────────────────────────────────────────────────────────
    - name: mctl.vault
      rules:
        - alert: VaultSealed
          expr: |
            vault_core_unsealed == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: Vault instance {{ $labels.instance }} is sealed
