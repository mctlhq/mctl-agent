name: build

on:
  push:
    tags: ["[0-9]*.[0-9]*.[0-9]*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          args: --timeout 5m

      - name: go build & test
        run: |
          go build ./...
          go test ./...

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mctlhq/mctl-agent
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITOPS_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/mctlhq/mctl-agent:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy scan results
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # On semver tag: pin the new image version in GitOps repo
      - name: Update mctl-gitops image tag
        if: github.ref_type == 'tag'
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/${{ vars.GITOPS_REPO || 'mctlhq/mctl-gitops' }}.git /tmp/mctl-gitops
          cd /tmp/mctl-gitops
          python3 - <<'PYEOF'
          import re, os
          f = 'platform-gitops/apps/templates/mctl-platform/mctl-agent.yaml'
          version = os.environ['VERSION']
          content = open(f).read()
          content = re.sub(
              r'(repository: ghcr\.io/mctlhq/mctl-agent\n\s+tag:)[^\n]+',
              r'\1 "' + version + '"',
              content
          )
          open(f, 'w').write(content)
          PYEOF
          git config user.email "ci@mctl.ai"
          git config user.name "mctl-ci"
          git add platform-gitops/apps/templates/mctl-platform/mctl-agent.yaml
          git diff --staged --quiet || git commit -m "chore: bump mctl-agent to ${VERSION}"
          git push

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *mctl-agent build failed*
            Branch/Tag: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
